name: Build and Release Android APK

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK and Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Create or Update GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: "🏰 Oráculo das Sombras (Download APK)"
          body: |
            ## 📥 Baixe o Jogo Pronto para Jogar!
            
            Clique abaixo para baixar o arquivo APK nativo do jogo e instalar diretamente no seu telefone celular Android:
            
            👉 **[Clique Aqui para Baixar o Jogo (app-debug.apk)](https://github.com/${{ github.repository }}/releases/latest/download/app-debug.apk)**
            
            ### 📜 Guia Rápido de Instalação:
            1. Baixe o arquivo `app-debug.apk` clicando no link acima.
            2. Abra o arquivo baixado em seu dispositivo Android.
            3. Se o sistema reter a instalação por segurança, toque em **Configurações** no alerta e ative a opção **Permitir desta fonte** (ou "Fontes Desconhecidas").
            4. Retorne e conclua a instalação.
            5. Inicie o jogo direto da sua gaveta de aplicativos e divirta-se desvendando os mistérios das sombras!
          draft: false
          prerelease: false
          files: |
            app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
